<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG 转 ICO - 多尺寸</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0A0A0C;
            font-family: 'Courier New', monospace;
            color: #E0E0E0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            color: #00E5FF;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .container {
            text-align: center;
            max-width: 800px;
        }
        .upload-area {
            border: 2px dashed #00E5FF;
            border-radius: 12px;
            padding: 40px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: rgba(0, 229, 255, 0.1);
            border-color: #00B8CC;
        }
        .upload-area.dragover {
            background: rgba(0, 229, 255, 0.2);
            border-color: #00FF00;
        }
        input[type="file"] {
            display: none;
        }
        button {
            padding: 15px 40px;
            background: #00E5FF;
            color: #0A0A0C;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
        }
        button:hover {
            background: #00B8CC;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 229, 255, 0.4);
        }
        button:disabled {
            background: #333;
            cursor: not-allowed;
            transform: none;
        }
        .preview {
            margin: 20px 0;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .preview-item {
            text-align: center;
        }
        .preview-item canvas {
            border: 1px solid #00E5FF;
            border-radius: 8px;
            background: #1E1E24;
        }
        .preview-item p {
            color: #00E5FF;
            font-size: 12px;
            margin-top: 5px;
        }
        .info {
            background: #1E1E24;
            border: 1px solid #00E5FF;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }
        .info h3 {
            color: #00E5FF;
            margin-top: 0;
        }
        .success {
            color: #00FF00;
        }
        .error {
            color: #FF3366;
        }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        #status.show {
            display: block;
        }
    </style>
</head>
<body>
    <h1>🔄 PNG 转 ICO 工具</h1>
    <div class="subtitle">生成包含多种尺寸的 ICO 文件（256x256 及以下）</div>
    
    <div class="container">
        <div class="upload-area" id="uploadArea">
            <p style="font-size: 48px; margin: 0;">📁</p>
            <p style="color: #00E5FF; margin: 10px 0;">点击或拖拽 PNG 文件到这里</p>
            <p style="color: #666; font-size: 12px;">支持的格式：PNG</p>
            <input type="file" id="fileInput" accept="image/png">
        </div>
        
        <div class="preview" id="preview"></div>
        
        <div>
            <button id="convertBtn" disabled onclick="convertToICO()">生成 ICO 文件</button>
        </div>
        
        <div id="status"></div>
        
        <div class="info">
            <h3>📋 使用说明</h3>
            <ol style="line-height: 2;">
                <li>上传你的 PNG 图标文件（建议 1024x1024 或更大）</li>
                <li>点击"生成 ICO 文件"按钮</li>
                <li>下载生成的 icon.ico 文件</li>
                <li>将 icon.ico 复制到项目的 <code style="color: #00E5FF;">build</code> 目录</li>
                <li>重新打包：<code style="color: #00E5FF;">npm run build:win</code></li>
            </ol>
            <p style="color: #FFA500; font-size: 13px;">
                ⚠ 注意：ICO 文件将包含 256x256, 128x128, 64x64, 48x48, 32x32, 16x16 六种尺寸
            </p>
        </div>
    </div>

    <script>
        let sourceImage = null;
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const preview = document.getElementById('preview');
        const status = document.getElementById('status');
        
        // 点击上传区域
        uploadArea.addEventListener('click', () => fileInput.click());
        
        // 文件选择
        fileInput.addEventListener('change', handleFileSelect);
        
        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type === 'image/png') {
                handleFile(files[0]);
            }
        });
        
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        }
        
        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    sourceImage = img;
                    showPreview(img);
                    convertBtn.disabled = false;
                    showStatus('✓ 图片已加载，可以生成 ICO 了', 'success');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function showPreview(img) {
            preview.innerHTML = '';
            const sizes = [256, 128, 64, 48, 32, 16];
            
            sizes.forEach(size => {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, size, size);
                
                const item = document.createElement('div');
                item.className = 'preview-item';
                item.appendChild(canvas);
                const label = document.createElement('p');
                label.textContent = `${size}x${size}`;
                item.appendChild(label);
                preview.appendChild(item);
            });
        }
        
        function showStatus(message, type) {
            status.textContent = message;
            status.className = `show ${type}`;
        }
        
        async function convertToICO() {
            if (!sourceImage) {
                showStatus('✗ 请先上传图片', 'error');
                return;
            }
            
            showStatus('⏳ 正在生成 ICO 文件...', '');
            
            try {
                // 创建包含多个尺寸的 ICO 文件
                const sizes = [256, 128, 64, 48, 32, 16];
                const images = [];
                
                for (const size of sizes) {
                    const canvas = document.createElement('canvas');
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(sourceImage, 0, 0, size, size);
                    
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    const arrayBuffer = await blob.arrayBuffer();
                    images.push({
                        size: size,
                        data: new Uint8Array(arrayBuffer)
                    });
                }
                
                // 生成 ICO 文件
                const icoData = createICO(images);
                
                // 下载
                const blob = new Blob([icoData], { type: 'image/x-icon' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'icon.ico';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showStatus('✓ ICO 文件已生成并下载！现在将它复制到 build 目录并重新打包。', 'success');
            } catch (error) {
                showStatus('✗ 生成失败：' + error.message, 'error');
            }
        }
        
        function createICO(images) {
            // ICO 文件头
            const header = new Uint8Array(6);
            header[0] = 0; // Reserved
            header[1] = 0;
            header[2] = 1; // Type: 1 = ICO
            header[3] = 0;
            header[4] = images.length; // Number of images
            header[5] = 0;
            
            // 计算每个图像的偏移量
            let offset = 6 + (images.length * 16); // Header + Directory entries
            const entries = [];
            
            for (const img of images) {
                const entry = new Uint8Array(16);
                entry[0] = img.size === 256 ? 0 : img.size; // Width (0 = 256)
                entry[1] = img.size === 256 ? 0 : img.size; // Height (0 = 256)
                entry[2] = 0; // Color palette
                entry[3] = 0; // Reserved
                entry[4] = 1; // Color planes
                entry[5] = 0;
                entry[6] = 32; // Bits per pixel
                entry[7] = 0;
                
                // Size of image data
                const size = img.data.length;
                entry[8] = size & 0xFF;
                entry[9] = (size >> 8) & 0xFF;
                entry[10] = (size >> 16) & 0xFF;
                entry[11] = (size >> 24) & 0xFF;
                
                // Offset of image data
                entry[12] = offset & 0xFF;
                entry[13] = (offset >> 8) & 0xFF;
                entry[14] = (offset >> 16) & 0xFF;
                entry[15] = (offset >> 24) & 0xFF;
                
                entries.push(entry);
                offset += size;
            }
            
            // 组合所有数据
            const totalSize = offset;
            const result = new Uint8Array(totalSize);
            let pos = 0;
            
            // 写入头部
            result.set(header, pos);
            pos += header.length;
            
            // 写入目录条目
            for (const entry of entries) {
                result.set(entry, pos);
                pos += entry.length;
            }
            
            // 写入图像数据
            for (const img of images) {
                result.set(img.data, pos);
                pos += img.data.length;
            }
            
            return result;
        }
    </script>
</body>
</html>
