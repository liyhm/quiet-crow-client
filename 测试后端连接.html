<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试后端连接</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0A0A0C;
            font-family: 'Courier New', monospace;
            color: #E0E0E0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            color: #00E5FF;
            text-align: center;
            margin-bottom: 30px;
        }
        .test-box {
            background: #1E1E24;
            border: 1px solid #00E5FF;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .test-box h2 {
            color: #00E5FF;
            font-size: 18px;
            margin-top: 0;
        }
        button {
            width: 100%;
            padding: 12px 24px;
            background: #00E5FF;
            color: #0A0A0C;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        button:hover {
            background: #00B8CC;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 229, 255, 0.4);
        }
        .result {
            background: #0A0A0C;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            font-size: 13px;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
        }
        .success {
            color: #00FF00;
        }
        .error {
            color: #FF3366;
        }
        .info {
            color: #00E5FF;
        }
        .warning {
            color: #FFA500;
        }
        pre {
            margin: 5px 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 后端连接测试工具</h1>
        
        <div class="test-box">
            <h2>测试 1: Swagger 文档访问</h2>
            <button onclick="testSwagger()">测试 Swagger 文档</button>
            <div id="swaggerResult" class="result"></div>
        </div>
        
        <div class="test-box">
            <h2>测试 2: 登录 API 连接</h2>
            <button onclick="testLoginAPI()">测试登录 API</button>
            <div id="loginResult" class="result"></div>
        </div>
        
        <div class="test-box">
            <h2>测试 3: 完整登录流程</h2>
            <input type="text" id="username" placeholder="用户名" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #0A0A0C; border: 1px solid #333; color: #E0E0E0; border-radius: 4px;">
            <input type="password" id="password" placeholder="密码" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #0A0A0C; border: 1px solid #333; color: #E0E0E0; border-radius: 4px;">
            <button onclick="testFullLogin()">测试完整登录</button>
            <div id="fullLoginResult" class="result"></div>
        </div>
        
        <div class="test-box">
            <h2>测试结论</h2>
            <div id="conclusion" class="result">
                <p class="info">请依次点击上面的测试按钮</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://159.75.182.85:8081';
        
        function log(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            const className = type;
            const timestamp = new Date().toLocaleTimeString();
            element.innerHTML += `<pre class="${className}">[${timestamp}] ${message}</pre>`;
            element.scrollTop = element.scrollHeight;
        }
        
        function clearLog(elementId) {
            document.getElementById(elementId).innerHTML = '';
        }
        
        // 测试 1: Swagger 文档
        async function testSwagger() {
            clearLog('swaggerResult');
            log('swaggerResult', '开始测试 Swagger 文档访问...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/swagger-ui/index.html`, {
                    method: 'GET',
                    mode: 'no-cors' // 避免 CORS 问题
                });
                
                log('swaggerResult', '✓ Swagger 文档可以访问', 'success');
                log('swaggerResult', `URL: ${API_BASE}/swagger-ui/index.html`, 'info');
                log('swaggerResult', '说明：后端服务正常运行', 'success');
                
                updateConclusion('swagger', true);
            } catch (error) {
                log('swaggerResult', '✗ Swagger 文档无法访问', 'error');
                log('swaggerResult', `错误: ${error.message}`, 'error');
                log('swaggerResult', '说明：后端服务可能未启动或网络不通', 'error');
                
                updateConclusion('swagger', false);
            }
        }
        
        // 测试 2: 登录 API
        async function testLoginAPI() {
            clearLog('loginResult');
            log('loginResult', '开始测试登录 API 连接...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'test',
                        password: 'test'
                    })
                });
                
                const data = await response.json();
                
                log('loginResult', `✓ API 可以访问`, 'success');
                log('loginResult', `状态码: ${response.status}`, 'info');
                log('loginResult', `响应数据: ${JSON.stringify(data, null, 2)}`, 'info');
                
                if (response.status === 401 || response.status === 400) {
                    log('loginResult', '说明：API 正常工作（用户名或密码错误是预期的）', 'success');
                    updateConclusion('api', true);
                } else if (response.status === 200) {
                    log('loginResult', '说明：API 正常工作（登录成功）', 'success');
                    updateConclusion('api', true);
                } else {
                    log('loginResult', '说明：API 返回了异常状态码', 'warning');
                    updateConclusion('api', false);
                }
            } catch (error) {
                log('loginResult', '✗ API 无法访问', 'error');
                log('loginResult', `错误: ${error.message}`, 'error');
                log('loginResult', '说明：后端 API 不可用或网络问题', 'error');
                
                updateConclusion('api', false);
            }
        }
        
        // 测试 3: 完整登录
        async function testFullLogin() {
            clearLog('fullLoginResult');
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                log('fullLoginResult', '请输入用户名和密码', 'warning');
                return;
            }
            
            log('fullLoginResult', '开始测试完整登录流程...', 'info');
            log('fullLoginResult', `用户名: ${username}`, 'info');
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                log('fullLoginResult', `状态码: ${response.status}`, 'info');
                log('fullLoginResult', `响应数据:`, 'info');
                log('fullLoginResult', JSON.stringify(data, null, 2), 'info');
                
                if (response.status === 200 && data.token) {
                    log('fullLoginResult', '✓ 登录成功！', 'success');
                    log('fullLoginResult', `Token: ${data.token.substring(0, 20)}...`, 'success');
                    log('fullLoginResult', '说明：后端完全正常，问题在前端 CSP 配置', 'success');
                    updateConclusion('login', true);
                } else if (response.status === 401 || response.status === 400) {
                    log('fullLoginResult', '✗ 登录失败：用户名或密码错误', 'error');
                    log('fullLoginResult', '说明：API 正常工作，但凭据不正确', 'warning');
                    updateConclusion('login', 'partial');
                } else {
                    log('fullLoginResult', '✗ 登录失败：未知错误', 'error');
                    updateConclusion('login', false);
                }
            } catch (error) {
                log('fullLoginResult', '✗ 登录失败', 'error');
                log('fullLoginResult', `错误: ${error.message}`, 'error');
                updateConclusion('login', false);
            }
        }
        
        // 更新结论
        const testResults = {
            swagger: null,
            api: null,
            login: null
        };
        
        function updateConclusion(test, result) {
            testResults[test] = result;
            
            const conclusionEl = document.getElementById('conclusion');
            conclusionEl.innerHTML = '<h3 style="color: #00E5FF; margin-top: 0;">测试结果总结</h3>';
            
            // 显示各项测试结果
            if (testResults.swagger !== null) {
                const status = testResults.swagger ? '✓ 通过' : '✗ 失败';
                const className = testResults.swagger ? 'success' : 'error';
                conclusionEl.innerHTML += `<p class="${className}">Swagger 文档: ${status}</p>`;
            }
            
            if (testResults.api !== null) {
                const status = testResults.api ? '✓ 通过' : '✗ 失败';
                const className = testResults.api ? 'success' : 'error';
                conclusionEl.innerHTML += `<p class="${className}">登录 API: ${status}</p>`;
            }
            
            if (testResults.login !== null) {
                let status, className;
                if (testResults.login === true) {
                    status = '✓ 通过';
                    className = 'success';
                } else if (testResults.login === 'partial') {
                    status = '⚠ 部分通过（凭据错误）';
                    className = 'warning';
                } else {
                    status = '✗ 失败';
                    className = 'error';
                }
                conclusionEl.innerHTML += `<p class="${className}">完整登录: ${status}</p>`;
            }
            
            // 给出最终结论
            if (testResults.swagger === true && testResults.api === true) {
                conclusionEl.innerHTML += `
                    <hr style="border-color: #333; margin: 20px 0;">
                    <h3 style="color: #00FF00;">✓ 最终结论：后端完全正常！</h3>
                    <p class="success">后端服务运行正常，API 可以正常访问。</p>
                    <p class="error">问题出在前端：你使用的是旧版本的应用，CSP 配置没有更新。</p>
                    <p class="warning">解决方案：</p>
                    <ol style="color: #00E5FF;">
                        <li>卸载当前安装的应用</li>
                        <li>清理构建目录：Remove-Item -Recurse -Force dist, out</li>
                        <li>重新打包：npm run build:win</li>
                        <li>安装新版本：.\\dist\\quiet-1.0.0-setup.exe</li>
                    </ol>
                `;
            } else if (testResults.swagger === false || testResults.api === false) {
                conclusionEl.innerHTML += `
                    <hr style="border-color: #333; margin: 20px 0;">
                    <h3 style="color: #FF3366;">✗ 最终结论：后端有问题！</h3>
                    <p class="error">后端服务无法访问或未启动。</p>
                    <p class="warning">解决方案：</p>
                    <ol style="color: #00E5FF;">
                        <li>检查后端服务是否启动</li>
                        <li>检查防火墙是否阻止了 8081 端口</li>
                        <li>检查网络连接</li>
                        <li>尝试在浏览器中访问：http://159.75.182.85:8081/swagger-ui/index.html</li>
                    </ol>
                `;
            }
        }
    </script>
</body>
</html>
